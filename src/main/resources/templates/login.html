<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RevWorkForce</title>
    <meta name="description" content="RevWorkForce HRM - Employee Login">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" href="/css/style.css" rel="stylesheet">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <h1><i class="fas fa-building me-2"></i>RevWorkForce</h1>
                <p>Human Resource Management System</p>
            </div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-floating-custom">
                    <label class="form-label-custom" for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" class="form-control-custom" placeholder="Enter your email"
                        required>
                </div>
                <div class="form-floating-custom">
                    <label class="form-label-custom" for="loginPassword">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="loginPassword" class="form-control-custom"
                            placeholder="Enter your password" required>
                        <button type="button" class="password-toggle"
                            onclick="togglePasswordVisibility('loginPassword', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div id="loginError" style="display:none;background:#fee2e2;border:1px solid #fecaca;color:#dc2626;padding:0.75rem 1rem;border-radius:8px;margin-top:0.75rem;font-size:0.85rem;text-align:center;">
                    <i class="fas fa-exclamation-triangle"></i> <span id="loginErrorMsg"></span>
                </div>
                <button type="submit" id="loginBtn" class="btn-primary-custom w-100 py-2 mt-2"
                    style="justify-content:center">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            <div class="mt-4"
                style="background:#eef2ff;padding:1rem;border-radius:8px;font-size:0.78rem;color:#64748b">
                <strong style="color:#475569">Demo Credentials:</strong><br>
                Admin: admin@revworkforce.com / admin123<br>
                Manager: manager@revworkforce.com / manager123<br>
                Employee: employee@revworkforce.com / employee123
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>

</html>
