<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Reviews - RevWorkForce</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" href="/css/style.css" rel="stylesheet">
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <h2><i class="fas fa-building"></i> RevWorkForce</h2><small id="sidebarUserRole"></small>
            </div>
            <ul class="sidebar-nav" id="sidebarNav"></ul>
        </aside>
        <main class="main-content">
            <div class="top-bar">
                <h1><i class="fas fa-chart-line"></i> Performance Reviews</h1>
                <div class="top-bar-actions">
                    <div class="notification-badge" onclick="toggleNotifications()" style="position:relative">
                        <i class="fas fa-bell"></i><span class="badge" id="notifBadge" style="display:none">0</span>
                        <div class="notification-dropdown" id="notifDropdown"></div>
                    </div>
                    <div class="user-info">
                        <div class="user-avatar" id="userAvatar"></div><span id="topBarUser"></span>
                    </div>
                </div>
            </div>

            <div class="tab-nav" id="performanceTabs"></div>

            <div class="tab-content active" id="myReviews">
                <div id="myReviewsContent"></div>
            </div>

            <div class="tab-content" id="createReview">
                <div class="card-custom">
                    <div class="card-header-custom">
                        <h3>Create Performance Review</h3>
                    </div>
                    <form id="createReviewForm" onsubmit="handleCreateReview(event)">
                        <div class="form-floating-custom">
                            <label class="form-label-custom">Key Deliverables *</label>
                            <textarea class="form-control-custom" id="reviewDeliverables"
                                placeholder="List your key deliverables" required></textarea>
                        </div>
                        <div class="form-floating-custom">
                            <label class="form-label-custom">Accomplishments</label>
                            <textarea class="form-control-custom" id="reviewAccomplishments"
                                placeholder="List your accomplishments"></textarea>
                        </div>
                        <div class="form-floating-custom">
                            <label class="form-label-custom">Areas of Improvement</label>
                            <textarea class="form-control-custom" id="reviewImprovements"
                                placeholder="Areas where you can improve"></textarea>
                        </div>
                        <div class="grid-2">
                            <div class="form-floating-custom">
                                <label class="form-label-custom">Self Assessment Rating (1-5) *</label>
                                <select class="form-control-custom" id="reviewSelfRating" required>
                                    <option value="">Select</option>
                                    <option value="1">1 - Needs Improvement</option>
                                    <option value="2">2 - Below Expectations</option>
                                    <option value="3">3 - Meets Expectations</option>
                                    <option value="4">4 - Exceeds Expectations</option>
                                    <option value="5">5 - Outstanding</option>
                                </select>
                            </div>
                            <div class="form-floating-custom">
                                <label class="form-label-custom">Review Year</label>
                                <input type="number" class="form-control-custom" id="reviewYear" value="2026">
                            </div>
                        </div>
                        <button type="submit" class="btn-primary-custom mt-2"><i class="fas fa-save"></i> Save as
                            Draft</button>
                    </form>
                </div>
            </div>

            <div class="tab-content" id="teamReviews">
                <div id="teamReviewsContent"></div>
            </div>
        </main>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>

</html>
