<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - RevWorkForce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" href="/css/style.css" rel="stylesheet">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card" style="max-width:480px">
            <div class="auth-logo">
                <h1><i class="fas fa-building me-2"></i>RevWorkForce</h1>
                <p>Create Your Account</p>
            </div>
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="grid-2">
                    <div class="form-floating-custom">
                        <label class="form-label-custom" for="regName">Full Name *</label>
                        <input type="text" id="regName" class="form-control-custom" placeholder="Full name" required>
                    </div>
                    <div class="form-floating-custom">
                        <label class="form-label-custom" for="regEmail">Email *</label>
                        <input type="email" id="regEmail" class="form-control-custom" placeholder="Email" required>
                    </div>
                </div>
                <div class="form-floating-custom">
                    <label class="form-label-custom" for="regPassword">Password * (min 6 chars)</label>
                    <div class="password-wrapper">
                        <input type="password" id="regPassword" class="form-control-custom" placeholder="Password"
                            required minlength="6">
                        <button type="button" class="password-toggle"
                            onclick="togglePasswordVisibility('regPassword', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="grid-2">
                    <div class="form-floating-custom">
                        <label class="form-label-custom" for="regDepartment">Department</label>
                        <input type="text" id="regDepartment" class="form-control-custom" placeholder="Department">
                    </div>
                    <div class="form-floating-custom">
                        <label class="form-label-custom" for="regDesignation">Designation</label>
                        <input type="text" id="regDesignation" class="form-control-custom" placeholder="Designation">
                    </div>
                </div>
                <div class="form-floating-custom">
                    <label class="form-label-custom" for="regPhone">Phone Number</label>
                    <input type="text" id="regPhone" class="form-control-custom" placeholder="Phone">
                </div>
                <button type="submit" id="registerBtn" class="btn-primary-custom w-100 py-2 mt-2"
                    style="justify-content:center">
                    <i class="fas fa-user-plus"></i> Register
                </button>
            </form>
            <div class="text-center mt-3">
                <span style="color:var(--text-muted);font-size:0.85rem">Already have an account?</span>
                <a th:href="@{/login}" href="/login"
                    style="color:var(--primary);font-size:0.85rem;text-decoration:none;font-weight:600"> Login</a>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>

</html>
