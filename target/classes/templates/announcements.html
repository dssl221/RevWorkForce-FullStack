<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcements - RevWorkForce</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" href="/css/style.css" rel="stylesheet">
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <h2><i class="fas fa-building"></i> RevWorkForce</h2><small id="sidebarUserRole"></small>
            </div>
            <ul class="sidebar-nav" id="sidebarNav"></ul>
        </aside>
        <main class="main-content">
            <div class="top-bar">
                <h1><i class="fas fa-bullhorn"></i> Announcements</h1>
                <div class="top-bar-actions">
                    <div class="notification-badge" onclick="toggleNotifications()" style="position:relative">
                        <i class="fas fa-bell"></i><span class="badge" id="notifBadge" style="display:none">0</span>
                        <div class="notification-dropdown" id="notifDropdown"></div>
                    </div>
                    <div class="user-info">
                        <div class="user-avatar" id="userAvatar"></div><span id="topBarUser"></span>
                    </div>
                </div>
            </div>

            <!-- Add Announcement (Admin) -->
            <div id="addAnnouncementSection" style="display:none" class="mb-3">
                <div class="card-custom">
                    <div class="card-header-custom">
                        <h3>Post Announcement</h3>
                    </div>
                    <form id="addAnnouncementForm" onsubmit="handleAddAnnouncement(event)">
                        <div class="grid-2">
                            <div class="form-floating-custom">
                                <label class="form-label-custom">Title *</label>
                                <input class="form-control-custom" id="annTitle" required placeholder="Title">
                            </div>
                            <div class="form-floating-custom">
                                <label class="form-label-custom">Description *</label>
                                <textarea class="form-control-custom" id="annDescription" required
                                    placeholder="Description"></textarea>
                            </div>
                        </div>
                        <button type="submit" class="btn-primary-custom mt-2"><i class="fas fa-bullhorn"></i>
                            Post</button>
                    </form>
                </div>
            </div>

            <div id="announcementsContent"></div>
        </main>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>

</html>
