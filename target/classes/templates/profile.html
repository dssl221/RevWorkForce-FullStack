<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - RevWorkForce</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" href="/css/style.css" rel="stylesheet">
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <h2><i class="fas fa-building"></i> RevWorkForce</h2><small id="sidebarUserRole"></small>
            </div>
            <ul class="sidebar-nav" id="sidebarNav"></ul>
        </aside>
        <main class="main-content">
            <div class="top-bar">
                <h1><i class="fas fa-user"></i> My Profile</h1>
                <div class="top-bar-actions">
                    <div class="notification-badge" onclick="toggleNotifications()" style="position:relative">
                        <i class="fas fa-bell"></i><span class="badge" id="notifBadge" style="display:none">0</span>
                        <div class="notification-dropdown" id="notifDropdown"></div>
                    </div>
                    <div class="user-info">
                        <div class="user-avatar" id="userAvatar"></div><span id="topBarUser"></span>
                    </div>
                </div>
            </div>

            <div class="grid-2">
                <!-- Profile Info -->
                <div class="card-custom">
                    <div class="card-header-custom">
                        <h3><i class="fas fa-id-badge"></i> Profile Information</h3>
                    </div>
                    <div style="font-size:0.9rem;line-height:2.2">
                        <div class="flex-between"><span style="color:var(--text-muted)">Name</span><strong
                                id="profileName"></strong></div>
                        <div class="flex-between"><span style="color:var(--text-muted)">Email</span><span
                                id="profileEmail"></span></div>
                        <div class="flex-between"><span style="color:var(--text-muted)">Employee ID</span><span
                                id="profileEmpId"></span></div>
                        <div class="flex-between"><span style="color:var(--text-muted)">Role</span><span
                                id="profileRole"></span></div>
                        <div class="flex-between"><span style="color:var(--text-muted)">Department</span><span
                                id="profileDept"></span></div>
                        <div class="flex-between"><span style="color:var(--text-muted)">Designation</span><span
                                id="profileDesig"></span></div>
                        <div class="flex-between"><span style="color:var(--text-muted)">Joining Date</span><span
                                id="profileJoining"></span></div>
                        <div class="flex-between"><span style="color:var(--text-muted)">Manager</span><span
                                id="profileManager"></span></div>
                    </div>
                </div>

                <!-- Edit Profile -->
                <div class="card-custom">
                    <div class="card-header-custom">
                        <h3><i class="fas fa-edit"></i> Edit Profile</h3>
                    </div>
                    <form id="editProfileForm" onsubmit="handleUpdateProfile(event)">
                        <div class="form-floating-custom">
                            <label class="form-label-custom">Phone Number</label>
                            <input class="form-control-custom" id="profilePhone" placeholder="Phone">
                        </div>
                        <div class="form-floating-custom">
                            <label class="form-label-custom">Address</label>
                            <textarea class="form-control-custom" id="profileAddress" placeholder="Address"></textarea>
                        </div>
                        <div class="form-floating-custom">
                            <label class="form-label-custom">Emergency Contact</label>
                            <input class="form-control-custom" id="profileEmergency" placeholder="Emergency contact">
                        </div>
                        <button type="submit" class="btn-primary-custom mt-2"><i class="fas fa-save"></i> Update
                            Profile</button>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>

</html>
