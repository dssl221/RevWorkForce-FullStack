<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Management - RevWorkForce</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" href="/css/style.css" rel="stylesheet">
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <h2><i class="fas fa-building"></i> RevWorkForce</h2><small id="sidebarUserRole"></small>
            </div>
            <ul class="sidebar-nav" id="sidebarNav"></ul>
        </aside>
        <main class="main-content">
            <div class="top-bar">
                <h1><i class="fas fa-calendar-alt"></i> Leave Management</h1>
                <div class="top-bar-actions">
                    <div class="notification-badge" onclick="toggleNotifications()" style="position:relative">
                        <i class="fas fa-bell"></i><span class="badge" id="notifBadge" style="display:none">0</span>
                        <div class="notification-dropdown" id="notifDropdown"></div>
                    </div>
                    <div class="user-info">
                        <div class="user-avatar" id="userAvatar"></div><span id="topBarUser"></span>
                    </div>
                </div>
            </div>

            <div class="tab-nav" id="leaveTabs"></div>

            <!-- My Leaves -->
            <div class="tab-content active" id="myLeaves">
                <div class="card-custom">
                    <div class="card-header-custom">
                        <h3>My Leave Applications</h3>
                    </div>
                    <div id="myLeavesTable"></div>
                </div>
            </div>

            <!-- Apply Leave -->
            <div class="tab-content" id="applyLeave">
                <div class="card-custom">
                    <div class="card-header-custom">
                        <h3>Apply for Leave</h3>
                    </div>
                    <form id="applyLeaveForm" onsubmit="handleApplyLeave(event)">
                        <div class="grid-2">
                            <div class="form-floating-custom">
                                <label class="form-label-custom">Leave Type *</label>
                                <select class="form-control-custom" id="leaveTypeSelect" required></select>
                            </div>
                            <div class="form-floating-custom">
                                <label class="form-label-custom">Reason</label>
                                <input class="form-control-custom" id="leaveReason" placeholder="Reason for leave">
                            </div>
                        </div>
                        <div class="grid-2">
                            <div class="form-floating-custom">
                                <label class="form-label-custom">Start Date *</label>
                                <input type="date" class="form-control-custom" id="leaveStartDate" required>
                            </div>
                            <div class="form-floating-custom">
                                <label class="form-label-custom">End Date *</label>
                                <input type="date" class="form-control-custom" id="leaveEndDate" required>
                            </div>
                        </div>
                        <button type="submit" class="btn-primary-custom mt-2"><i class="fas fa-paper-plane"></i> Apply
                            Leave</button>
                    </form>
                </div>
            </div>

            <!-- Leave Balance -->
            <div class="tab-content" id="leaveBalance">
                <div class="card-custom">
                    <div class="card-header-custom">
                        <h3>Leave Balance</h3>
                    </div>
                    <div class="balance-grid" id="leaveBalanceGrid"></div>
                </div>
            </div>

            <!-- Team Leaves -->
            <div class="tab-content" id="teamLeaves">
                <div class="card-custom">
                    <div class="card-header-custom">
                        <h3>Team Leave Requests</h3>
                    </div>
                    <div id="teamLeavesTable"></div>
                </div>
            </div>

            <!-- All Leaves (Admin) -->
            <div class="tab-content" id="allLeaves">
                <div class="card-custom">
                    <div class="card-header-custom">
                        <h3>All Leave Requests</h3>
                    </div>
                    <div id="allLeavesTable"></div>
                </div>
            </div>

            <!-- Leave Types (Admin) -->
            <div class="tab-content" id="leaveTypes">
                <div class="card-custom">
                    <div class="card-header-custom">
                        <h3>Leave Types</h3>
                    </div>
                    <div id="leaveTypesTable"></div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>

</html>
